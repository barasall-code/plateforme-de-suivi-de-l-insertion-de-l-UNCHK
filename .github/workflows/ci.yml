name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test-backend:
    name: Tests Backend
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: unchk_test
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      - name: Installer dependances
        working-directory: backend
        run: npm ci
      - name: Generer client Prisma
        working-directory: backend
        run: npx prisma generate
        env:
          DATABASE_URL: postgresql://test_user:test_password@localhost:5432/unchk_test
      - name: Appliquer migrations
        working-directory: backend
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: postgresql://test_user:test_password@localhost:5432/unchk_test
      - name: Lancer les tests
        working-directory: backend
        run: npm test
        env:
          JWT_SECRET: ci-test-secret-key-unchk-2026
          JWT_EXPIRES_IN: 15m
          DATABASE_URL: postgresql://test_user:test_password@localhost:5432/unchk_test
          NODE_ENV: test
      - name: Verifier compilation TypeScript
        working-directory: backend
        run: npm run lint

  build-backend:
    name: Build Backend
    runs-on: ubuntu-latest
    needs: test-backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      - name: Installer dependances
        working-directory: backend
        run: npm ci
      - name: Build TypeScript
        working-directory: backend
        run: npm run build
      - name: Verifier dist/index.js
        run: test -f backend/dist/index.js && echo "Build OK" || exit 1
